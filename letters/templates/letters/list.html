{% extends 'base.html' %}
{% block title %}Журнал писем{% endblock %}

{% block content %}
<link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">

<div class="container-fluid mt-3">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Журнал писем</h4>
    <div class="d-flex gap-2">
      {% if can_manage_templates %}
      <a href="{{ url_for('letters.list_templates') }}" class="btn btn-outline-secondary btn-sm">
        📋 Шаблоны
      </a>
      {% endif %}
      <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
        + Создать письмо
      </button>
    </div>
  </div>

  <div id="letters-table"></div>

</div>

{# МОДАЛ СОЗДАНИЯ / РЕДАКТИРОВАНИЯ #}
{% include 'letters/_modal.html' %}

<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
<script>
// ─── Вспомогательные форматтеры ───────────────────────────────────────────────

function fmtDirection(cell) {
  const row = cell.getRow().getData();
  const dir = row.direction;
  const badge = dir === 'in'
    ? '<span class="badge bg-info text-dark" title="Входящее">&larr; Вх.</span>'
    : '<span class="badge bg-primary" title="Исходящее">&rarr; Исх.</span>';
  const cp = row.counterparty_name
    ? '<br><small class="text-muted">' + row.counterparty_name + '</small>'
    : '';
  return badge + cp;
}

function fmtSubject(cell) {
  const row = cell.getRow().getData();
  let html = cell.getValue() || '';
  if (row.note) html += '<br><small class="text-muted">' + row.note + '</small>';
  return html;
}

function fmtTags(cell) {
  const tags = cell.getValue();
  if (!tags || !tags.length) return '';
  return tags.map(t =>
    '<span class="badge bg-secondary me-1">' + t + '</span>'
  ).join('');
}

function fmtActions(cell) {
  const row = cell.getRow().getData();
  let html = '';
  if (row.can_edit) {
    html += '<button class="btn btn-outline-primary btn-sm py-0 me-1" '
          + 'onclick="openEditModal(' + row.id + ')">Ред.</button>';
  }
  if (row.can_delete) {
    html += '<button class="btn btn-outline-danger btn-sm py-0" '
          + 'onclick="deleteLetter(' + row.id + ')">Удал.</button>';
  }
  return html;
}

// ─── Tabulator ────────────────────────────────────────────────────────────────

const table = new Tabulator('#letters-table', {
  ajaxURL: '/letters/api/list',
  layout: 'fitColumns',
  pagination: false,
  placeholder: 'Писем не найдено.',
  locale: 'ru',
  langs: {
    ru: {
      headerFilters: { default: 'Фильтр...' },
      data: { loading: 'Загрузка...', error: 'Ошибка загрузки' },
      pagination: { page: 'Стр.', of: 'из' },
    }
  },
  columns: [
    {
      title: 'Дата', field: 'date', width: 115, sorter: 'date',
      headerFilter: 'input', headerFilterPlaceholder: 'дд.мм.гггг',
    },
    {
      title: 'Номер', field: 'number', width: 130,
      headerFilter: 'input',
    },
    {
      title: 'Напр. / Контрагент', field: 'direction', width: 170,
      formatter: fmtDirection,
      headerFilter: 'select',
      headerFilterParams: { values: { '': '— все —', 'out': '→ Исходящие', 'in': '← Входящие' } },
      headerFilterFunc: function(headerValue, rowValue) {
        if (!headerValue) return true;
        return rowValue === headerValue;
      },
    },
    {
      title: 'Тема', field: 'subject',
      formatter: fmtSubject,
      headerFilter: 'input',
    },
    {
      title: 'Теги', field: 'tags', width: 200,
      formatter: fmtTags,
      sorter: function(a, b) {
        return (a || []).join(',').localeCompare((b || []).join(','));
      },
      headerFilter: 'input',
      headerFilterPlaceholder: 'тег...',
      headerFilterFunc: function(headerValue, rowValue) {
        if (!headerValue) return true;
        const q = headerValue.toLowerCase();
        return (rowValue || []).some(t => t.toLowerCase().includes(q));
      },
    },
    {
      title: 'Исполнитель', field: 'executor_display', width: 150,
      headerFilter: 'input',
    },
    {
      title: 'Действия', field: 'id', width: 120,
      formatter: fmtActions,
      hozAlign: 'center',
      headerSort: false,
    },
  ],
});

// ─── Удаление через fetch ─────────────────────────────────────────────────────

function deleteLetter(id) {
  if (!confirm('Удалить письмо?')) return;
  fetch('/letters/' + id + '/delete', { method: 'POST' })
    .then(r => { if (r.ok || r.redirected) table.replaceData(); })
    .catch(() => alert('Ошибка при удалении'));
}

// ─── Модал создания ───────────────────────────────────────────────────────────

function _getModal() {
  return bootstrap.Modal.getOrCreateInstance(document.getElementById('letterModal'));
}

function openCreateModal() {
  document.getElementById('modalLetterTitle').textContent = 'Создать письмо';
  document.getElementById('letterForm').action = "{{ url_for('letters.create_letter') }}";
  document.getElementById('fDate').value     = '';
  document.getElementById('fNumber').value   = '';
  document.getElementById('fSubject').value  = '';
  document.getElementById('fNote').value     = '';
  document.getElementById('fTags').value     = '';
  document.getElementById('fExecutor').value = '';
  document.getElementById('cpInput').value   = '';
  document.getElementById('fCounterpartyId').value = '';
  document.getElementById('dirOut').checked  = true;
  document.getElementById('cpLabel').textContent = 'Кому';
  updateTagBadges([]);
  _tplLoaded = false;
  _getModal().show();
}

function openEditModal(id) {
  fetch('/letters/' + id + '/edit')
    .then(r => r.json())
    .then(data => {
      document.getElementById('modalLetterTitle').textContent = 'Редактировать письмо';
      document.getElementById('letterForm').action = '/letters/' + id + '/edit';
      document.getElementById('fDate').value     = data.date        || '';
      document.getElementById('fNumber').value   = data.number      || '';
      document.getElementById('fSubject').value  = data.subject     || '';
      document.getElementById('fNote').value     = data.note        || '';
      document.getElementById('fTags').value     = data.tags        || '';
      document.getElementById('fExecutor').value = data.executor_id || '';

      const dir = data.direction || 'out';
      document.getElementById('dirOut').checked = (dir === 'out');
      document.getElementById('dirIn').checked  = (dir === 'in');
      document.getElementById('cpLabel').textContent = (dir === 'out') ? 'Кому' : 'От кого';

      document.getElementById('cpInput').value = data.counterparty_name || '';
      document.getElementById('fCounterpartyId').value = data.counterparty_id || '';

      const tagList = data.tags ? data.tags.split(',').map(s => s.trim()).filter(Boolean) : [];
      updateTagBadges(tagList);
      _tplLoaded = false;
      _getModal().show();
    });
}

// После сохранения из модала — перезагружаем таблицу
document.addEventListener('DOMContentLoaded', function () {
  const form = document.getElementById('letterForm');
  if (form) {
    form.addEventListener('submit', function () {
      setTimeout(() => table.replaceData(), 600);
    });
  }
});
</script>
{% endblock %}
