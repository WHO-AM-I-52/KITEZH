{% extends 'base.html' %}
{% block content %}

<style>
  .pkg-row { transition: background .15s; }
  .pkg-row:hover { background: rgba(0,0,0,.03); }
  #installAllLog, .pkg-log {
    font-size: 11px;
    background: #f8f9fa;
    border-radius: 6px;
    padding: 8px 10px;
    max-height: 160px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: #495057;
    display: none;
    margin-top: 6px;
  }
  body[data-theme="dark"] #installAllLog,
  body[data-theme="dark"] .pkg-log { background:#1e2235; color:#e2e8f0; }
  body[data-theme="zone"] #installAllLog,
  body[data-theme="zone"] .pkg-log { background:#161712; color:#c8c4a8; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .spin { animation: spin .7s linear infinite; display:inline-block; }
</style>

<div class="d-flex align-items-center mb-4 gap-3">
  <a href="{{ url_for('admin.admin_index') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h5 class="mb-0" style="color:#1B5E7B">
    <i class="bi bi-box-seam me-1"></i> Зависимости Python
  </h5>
</div>

<div class="card mb-3 p-3" style="max-width:820px;border-left:4px solid #198754">
  <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
    <div>
      <div class="fw-bold" style="font-size:14px">
        <i class="bi bi-box-seam me-1" style="color:#198754"></i>
        Пакеты из <code>requirements.txt</code>
      </div>
      <div id="depsStatusLine" class="text-muted mt-1" style="font-size:12px">
        <span class="spin"><i class="bi bi-arrow-repeat"></i></span> Проверяем…
      </div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-secondary" onclick="depsCheck()">
        <i class="bi bi-arrow-clockwise"></i> Обновить
      </button>
      <button id="btnInstallAll" class="btn btn-sm btn-success d-none" onclick="depsInstallAll()">
        <i class="bi bi-download"></i> Установить все
      </button>
    </div>
  </div>
  <div id="installAllLog" class="mt-2"></div>
</div>

<div id="pkgTable" style="max-width:820px"></div>

<script>
function _esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function depsCheck() {
  var sl = document.getElementById('depsStatusLine');
  var tbl = document.getElementById('pkgTable');
  sl.innerHTML = '<span class="spin"><i class="bi bi-arrow-repeat"></i></span> Проверяем…';
  tbl.innerHTML = '';
  document.getElementById('btnInstallAll').classList.add('d-none');

  fetch('/api/deps/check', {credentials: 'same-origin'})
    .then(function(r){ return r.json(); })
    .then(function(data){
      var missing = data.packages.filter(function(p){ return !p.installed; });
      if (missing.length === 0) {
        sl.innerHTML = '<i class="bi bi-check-circle-fill text-success me-1"></i>Все ' + data.packages.length + ' пакетов установлены';
      } else {
        sl.innerHTML = '<i class="bi bi-exclamation-triangle-fill text-warning me-1"></i>' +
          '<strong>' + missing.length + '</strong> из ' + data.packages.length + ' пакетов не установлены';
        document.getElementById('btnInstallAll').classList.remove('d-none');
      }
      renderTable(data.packages);
    })
    .catch(function(){
      sl.innerHTML = '<i class="bi bi-wifi-off text-danger me-1"></i>Ошибка соединения';
    });
}

function renderTable(packages) {
  var tbl = document.getElementById('pkgTable');
  var rows = packages.map(function(p, i) {
    var badge = p.installed
      ? '<span class="badge bg-success">✓ Установлен</span>'
      : '<span class="badge bg-danger">✗ Отсутствует</span>';
    var btn = p.installed ? '' :
      '<button class="btn btn-sm btn-outline-success" onclick="depsInstallOne(\'' + _esc(p.name) + '\', ' + i + ')">' +
      '<i class="bi bi-download"></i> Установить</button>';
    var ver = p.required_version ? '<span class="text-muted" style="font-size:11px">' + _esc(p.required_version) + '</span>' : '';
    var installed_ver = p.installed_version ? '<span class="text-muted ms-1" style="font-size:11px">(' + _esc(p.installed_version) + ')</span>' : '';
    return '<tr class="pkg-row" id="pkgrow-' + i + '">' +
      '<td class="ps-2" style="font-size:13px"><code>' + _esc(p.name) + '</code> ' + ver + installed_ver + '</td>' +
      '<td>' + badge + '</td>' +
      '<td class="text-end pe-2">' + btn + '</td>' +
      '</tr>' +
      '<tr id="pkglog-' + i + '" style="display:none"><td colspan="3"><div class="pkg-log" id="logdiv-' + i + '"></div></td></tr>';
  }).join('');

  tbl.innerHTML = '<div class="card" style="overflow:hidden"><table class="table table-sm mb-0">' +
    '<thead><tr><th class="ps-2">Пакет</th><th>Статус</th><th></th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div>';
}

function _streamInstall(url, body, logEl, onDone) {
  logEl.style.display = 'block';
  logEl.textContent = '';
  fetch(url, {
    method: 'POST',
    credentials: 'same-origin',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    logEl.textContent = d.output || d.error || 'Готово';
    logEl.scrollTop = logEl.scrollHeight;
    if (onDone) onDone(d);
  })
  .catch(function(e) {
    logEl.textContent = 'Ошибка: ' + e;
    if (onDone) onDone({ok: false});
  });
}

function depsInstallOne(pkgName, idx) {
  var logRow = document.getElementById('pkglog-' + idx);
  var logDiv = document.getElementById('logdiv-' + idx);
  logRow.style.display = '';
  logDiv.style.display = 'block';
  logDiv.textContent = 'Устанавливаем ' + pkgName + '…';

  _streamInstall('/api/deps/install', {package: pkgName}, logDiv, function(d) {
    if (d.ok) { setTimeout(depsCheck, 800); }
  });
}

function depsInstallAll() {
  var logEl = document.getElementById('installAllLog');
  logEl.style.display = 'block';
  logEl.textContent = 'Запускаем pip install -r requirements.txt…';
  document.getElementById('btnInstallAll').disabled = true;

  _streamInstall('/api/deps/install', {all: true}, logEl, function(d) {
    document.getElementById('btnInstallAll').disabled = false;
    if (d.ok) { setTimeout(depsCheck, 800); }
  });
}

depsCheck();
</script>
{% endblock %}
