{% extends 'base.html' %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
  <h5 class="mb-0" style="color:#1B5E7B">
    <i class="bi bi-shield-lock me-1"></i> Администрирование
  </h5>
</div>

<div class="row g-3" style="max-width:900px">

  <div class="col-md-4">
    <a href="{{ url_for('admin.manage_users') }}" class="text-decoration-none">
      <div class="card h-100 p-3" style="border-left:4px solid #1B5E7B;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,.12)'" onmouseout="this.style.boxShadow=''">
        <div class="d-flex align-items-center gap-3">
          <i class="bi bi-people-fill" style="font-size:2rem;color:#1B5E7B"></i>
          <div>
            <div class="fw-bold" style="color:#1B5E7B">Пользователи</div>
            <div class="text-muted" style="font-size:12px">Управление учётными записями и правами</div>
          </div>
        </div>
      </div>
    </a>
  </div>

  <div class="col-md-4">
    <a href="{{ url_for('admin.classifiers') }}" class="text-decoration-none">
      <div class="card h-100 p-3" style="border-left:4px solid #6f42c1;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,.12)'" onmouseout="this.style.boxShadow=''">
        <div class="d-flex align-items-center gap-3">
          <i class="bi bi-table" style="font-size:2rem;color:#6f42c1"></i>
          <div>
            <div class="fw-bold" style="color:#6f42c1">Классификаторы</div>
            <div class="text-muted" style="font-size:12px">Справочники, типы, районы</div>
          </div>
        </div>
      </div>
    </a>
  </div>

  <div class="col-md-4">
    <a href="{{ url_for('admin.saved_filters') }}" class="text-decoration-none">
      <div class="card h-100 p-3" style="border-left:4px solid #0d6efd;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,.12)'" onmouseout="this.style.boxShadow=''">
        <div class="d-flex align-items-center gap-3">
          <i class="bi bi-funnel-fill" style="font-size:2rem;color:#0d6efd"></i>
          <div>
            <div class="fw-bold" style="color:#0d6efd">Фильтры</div>
            <div class="text-muted" style="font-size:12px">Сохранённые фильтры обращений</div>
          </div>
        </div>
      </div>
    </a>
  </div>

  <div class="col-md-4">
    <a href="{{ url_for('admin.admin_deps') }}" class="text-decoration-none">
      <div class="card h-100 p-3" style="border-left:4px solid #198754;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,.12)'" onmouseout="this.style.boxShadow=''">
        <div class="d-flex align-items-center gap-3">
          <i class="bi bi-box-seam-fill" style="font-size:2rem;color:#198754"></i>
          <div>
            <div class="fw-bold" style="color:#198754">Зависимости</div>
            <div class="text-muted" style="font-size:12px">Python-пакеты, установка, статус</div>
          </div>
        </div>
      </div>
    </a>
  </div>

  <div class="col-md-4">
    <a href="{{ url_for('misc.changelog') }}" class="text-decoration-none">
      <div class="card h-100 p-3" style="border-left:4px solid #fd7e14;transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,.12)'" onmouseout="this.style.boxShadow=''">
        <div class="d-flex align-items-center gap-3">
          <i class="bi bi-clock-history" style="font-size:2rem;color:#fd7e14"></i>
          <div>
            <div class="fw-bold" style="color:#fd7e14">Обновления</div>
            <div class="text-muted" style="font-size:12px">Журнал версий, режим ТО</div>
          </div>
        </div>
      </div>
    </a>
  </div>

</div>
{% endblock %}
