<script>
// ── OCR: активация кнопки при выборе файла ───────────────────────────
document.getElementById('requestFilesInput')?.addEventListener('change', function() {
  const btn = document.getElementById('btnOcr');
  const hint = document.getElementById('ocrHint');
  if (!btn) return;
  if (this.files && this.files.length > 0) {
    btn.disabled = false;
    if (hint) hint.textContent = 'Файл выбран. Нажмите для распознавания.';
  } else {
    btn.disabled = true;
    if (hint) hint.textContent = 'Прикрепите файл анкеты, чтобы активировать распознавание';
  }
});

// ── OCR: отправка файла на /ai/ocr-preview и открытие модального окна (#67) ───
function submitOcr() {
  const input  = document.getElementById('requestFilesInput');
  const btn    = document.getElementById('btnOcr');
  const hint   = document.getElementById('ocrHint');
  if (!input || !input.files || input.files.length === 0) return;

  const file = input.files[0];
  const allowed = ['.pdf','.docx','.doc','.jpg','.jpeg','.png'];
  const ext  = '.' + file.name.split('.').pop().toLowerCase();
  if (!allowed.includes(ext)) {
    if (hint) hint.textContent = 'Неподдерживаемый формат для OCR: ' + ext;
    return;
  }

  // Состояние загрузки
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Распознаю...'; }
  if (hint) hint.textContent = 'Файл отправлен на распознавание…';

  const fd = new FormData();
  fd.append('file', file);

  fetch('/ai/ocr-preview', {
    method: 'POST',
    headers: { 'X-Requested-With': 'XMLHttpRequest' },
    body: fd,
  })
  .then(r => r.json())
  .then(data => {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-magic me-1"></i>Распознать анкету (OCR)'; }
    if (!data.ok) {
      if (hint) hint.textContent = '✖ ' + (data.error || 'Ошибка OCR');
      return;
    }
    if (hint) hint.textContent = '✔ Распознано. Проверьте и нажмите «Применить в форму».';
    ocrPreviewOpen(data.raw_text || '', data.fields || {}, data.msg || '');
  })
  .catch(err => {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-magic me-1"></i>Распознать анкету (OCR)'; }
    if (hint) hint.textContent = '✖ Ошибка сети: ' + err.message;
  });
}

// ── Предпросмотр файлов ─────────────────────────────────────────────────
function previewFiles(input) {
  const container = document.getElementById('filesPreview');
  container.innerHTML = '';
  const iconMap = {
    pdf:  '<i class="bi bi-file-earmark-pdf text-danger" style="font-size:1.6rem"></i>',
    doc:  '<i class="bi bi-file-earmark-word text-primary" style="font-size:1.6rem"></i>',
    docx: '<i class="bi bi-file-earmark-word text-primary" style="font-size:1.6rem"></i>',
    xls:  '<i class="bi bi-file-earmark-excel text-success" style="font-size:1.6rem"></i>',
    xlsx: '<i class="bi bi-file-earmark-excel text-success" style="font-size:1.6rem"></i>',
    ppt:  '<i class="bi bi-file-earmark-slides text-warning" style="font-size:1.6rem"></i>',
    pptx: '<i class="bi bi-file-earmark-slides text-warning" style="font-size:1.6rem"></i>',
    jpg:  '<i class="bi bi-file-earmark-image text-info" style="font-size:1.6rem"></i>',
    jpeg: '<i class="bi bi-file-earmark-image text-info" style="font-size:1.6rem"></i>',
    png:  '<i class="bi bi-file-earmark-image text-info" style="font-size:1.6rem"></i>',
    zip:  '<i class="bi bi-file-earmark-zip text-secondary" style="font-size:1.6rem"></i>',
  };
  Array.from(input.files).forEach(file => {
    const ext = file.name.split('.').pop().toLowerCase();
    const icon = iconMap[ext] || '<i class="bi bi-file-earmark" style="font-size:1.6rem"></i>';
    const name = file.name.length > 14 ? file.name.slice(0,12) + '…' : file.name;
    const div = document.createElement('div');
    div.className = 'd-flex flex-column align-items-center border rounded p-2';
    div.style.cssText = 'width:80px;font-size:0.72rem;word-break:break-all';
    div.innerHTML = icon + `<span class="mt-1 text-center">${name}</span>`;
    container.appendChild(div);
  });
}

// ── Источник → поле № входящего / № письма СЭДО ───────────────────
function toggleIncomingNumber() {
  const checked = Array.from(document.querySelectorAll('input[name="source_type"]:checked'));
  const values  = checked.map(c => c.value);
  const isSedo  = values.some(v => v === 'СЭДО');
  const isMail  = values.some(v => ['Письмо', 'Почта', 'Входящий документ'].some(s => v.includes(s)));
  const show    = isSedo || isMail;

  const block   = document.getElementById('incomingNumberBlock');
  const label   = document.getElementById('incomingNumberLabel');
  const input   = document.getElementById('incoming_number');

  if (!block) return;
  block.style.display = show ? '' : 'none';

  if (label) label.textContent = isSedo ? '№ письма СЭДО *' : '№ входящего обращения';
  if (input) {
    input.required    = isSedo;
    input.placeholder = isSedo ? 'Например: СЭДО-2026-0042' : 'Например: ВХ-2026-0042';
  }
}
toggleIncomingNumber();

// ── Фильтрация районов ─────────────────────────────────────────────────
function filterDistricts() {
  const q = document.getElementById('districtSearch').value.toLowerCase();
  document.querySelectorAll('.district-item').forEach(el => {
    el.style.display = el.dataset.name.includes(q) ? '' : 'none';
  });
}
function clearDistricts() {
  document.querySelectorAll('input[name="preferred_districts"]').forEach(cb => cb.checked = false);
}

// ── Вода: пересчёт итога ─────────────────────────────────────────────
function calcWaterTotal() {
  const ids = ['water_household','water_production','water_sewage','water_firefighting'];
  const total = ids.reduce((s,id) => s + (parseFloat(document.getElementById(id)?.value)||0), 0);
  const el = document.getElementById('water_total');
  if (el) el.value = total > 0 ? total.toFixed(1) : '';
}

// ── Электричество: пересчёт итога ──────────────────────────────────────
function calcElectricityTotal() {
  const ids = ['electricity_cat1','electricity_cat2','electricity_cat3'];
  const total = ids.reduce((s,id) => s + (parseFloat(document.getElementById(id)?.value)||0), 0);
  const el = document.getElementById('electricity_total');
  if (el) el.value = total > 0 ? total.toFixed(1) : '';
}

// ── ЕГРЮЛ lookup ───────────────────────────────────────────────────────
function egrulLookup() {
  var innEl  = document.getElementById('applicant_inn');
  var status = document.getElementById('egrul_status');
  var btn    = document.getElementById('btn_egrul_lookup');
  var icon   = document.getElementById('egrul_btn_icon');
  if (!innEl || !status || !btn) return;

  var inn = (innEl.value || '').trim();
  if (!inn) {
    status.textContent = 'Введите ИНН';
    status.className   = 'text-danger';
    return;
  }

  btn.disabled   = true;
  icon.className = 'spinner-border spinner-border-sm';
  icon.setAttribute('role', 'status');
  status.textContent = 'Запрос к ЕГРЮЛ…';
  status.className   = 'text-muted';

  fetch('/api/egrul/lookup?inn=' + encodeURIComponent(inn), {
    headers: { 'X-Requested-With': 'XMLHttpRequest' }
  })
  .then(function(r) { return r.json(); })
  .then(function(resp) {
    btn.disabled   = false;
    icon.className = 'bi bi-search';
    icon.removeAttribute('role');

    if (!resp.ok) {
      status.textContent = resp.error || 'Ошибка запроса';
      status.className   = 'text-danger';
      return;
    }

    var d   = resp.data;
    var map = {
      'applicant_full_name':  d.applicant_full_name,
      'applicant_short_name': d.applicant_short_name,
      'legal_address':        d.legal_address,
      'applicant_okved_main': d.applicant_okved_main
    };

    Object.keys(map).forEach(function(name) {
      if (!map[name]) return;
      var el = document.querySelector('[name="' + name + '"]');
      if (el && !el.value) el.value = map[name];
    });

    status.textContent = '✓ Реквизиты найдены и заполнены';
    status.className   = 'text-success';

    setTimeout(function() {
      status.textContent = '';
      status.className   = '';
    }, 4000);
  })
  .catch(function() {
    btn.disabled   = false;
    icon.className = 'bi bi-search';
    icon.removeAttribute('role');
    status.textContent = 'Ошибка сети — повторите попытку';
    status.className   = 'text-danger';
  });
}

// ── ОКВЭД autocomplete ─────────────────────────────────────────────────
let okvedTimer;
document.getElementById('okved_main_input')?.addEventListener('input', function() {
  clearTimeout(okvedTimer);
  const q = this.value.trim();
  const box = document.getElementById('okved_suggestions');
  if (!q || q.length < 2) { if(box) box.style.display='none'; return; }
  okvedTimer = setTimeout(() => {
    fetch(`/api/okved?q=${encodeURIComponent(q)}`)
      .then(r => r.json())
      .then(items => {
        if (!box) return;
        box.innerHTML = '';
        if (!items.length) { box.style.display='none'; return; }
        items.slice(0,10).forEach(item => {
          const a = document.createElement('a');
          a.href = '#';
          a.className = 'list-group-item list-group-item-action py-1 px-2';
          a.textContent = `${item.code} — ${item.name}`;
          a.onclick = e => {
            e.preventDefault();
            document.getElementById('okved_main_input').value = item.code;
            const nameEl = document.getElementById('okved_main_name');
            if (nameEl) nameEl.value = item.name;
            box.style.display = 'none';
          };
          box.appendChild(a);
        });
        box.style.display = 'block';
      });
  }, 300);
});
document.addEventListener('click', e => {
  const box = document.getElementById('okved_suggestions');
  if (box && !box.contains(e.target) && e.target.id !== 'okved_main_input') {
    box.style.display = 'none';
  }
});

// ── Проверка дублей (jellyfish) ────────────────────────────────────────
document.getElementById('applicant_short_name')?.addEventListener('blur', function () {
  const name = this.value.trim();
  const inn  = (document.getElementById('applicant_inn')?.value || '').trim();
  if (!name && !inn) return;

  fetch('/api/check-duplicate', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
    body:    JSON.stringify({ name, inn })
  })
  .then(r => r.json())
  .then(data => {
    const box = document.getElementById('duplicateWarning');
    if (!box) return;
    if (!data.duplicates || !data.duplicates.length) {
      box.style.display = 'none';
      return;
    }
    const method = data.method === 'inn' ? 'совпадение по ИНН' : 'похожее название';
    const links  = data.duplicates.map(d =>
      `<a href="/request/${d.id}" target="_blank" class="alert-link">#${d.id} ${d.name || ''}</a>`
    ).join(', ');
    box.innerHTML = `<i class="bi bi-exclamation-triangle me-1"></i>Возможный дубль (${method}): ${links}`;
    box.style.display = 'block';
  })
  .catch(() => {});
});
</script>
