{# ===== РАЗДЕЛ 9: ДОПОЛНИТЕЛЬНАЯ ИНФОРМАЦИЯ ===== #}
<div class="card mb-3">
  <div class="card-header py-2" style="background:#1B5E7B;color:#fff;font-size:13px;font-weight:600">
    <i class="bi bi-chat-text me-1"></i>9. Дополнительная информация
  </div>
  <div class="card-body row g-3">
    <div class="col-12">
      <label class="form-label" style="font-size:12px">Дополнительные сведения</label>
      <textarea name="additional_info" class="form-control form-control-sm" rows="3"
                placeholder="Любая дополнительная информация по проекту или требованиям">{{ req.additional_info if req else '' }}</textarea>
    </div>
  </div>
</div>
