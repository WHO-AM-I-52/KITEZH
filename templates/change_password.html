{% extends 'base.html' %}
{% block content %}

<div class="d-flex align-items-center mb-4">
  <h5 class="mb-0" style="color:#1B5E7B">
    <i class="bi bi-key me-1"></i>Смена пароля
  </h5>
</div>

<div style="max-width:400px">
  <div class="card">
    <div class="card-header fw-bold" style="background:#1B5E7B;color:#fff">
      Установите новый пароль
    </div>
    <div class="card-body">

      {% if session.must_change_password %}
      <div class="alert alert-warning" style="font-size:13px">
        <i class="bi bi-exclamation-triangle me-1"></i>
        Вы используете временный пароль. Установите постоянный перед продолжением работы.
      </div>
      {% endif %}

      <form method="post" action="{{ url_for('auth.change_password') }}">
        <div class="mb-3">
          <label class="form-label">Новый пароль</label>
          <div class="input-group">
            <input type="password" id="new_password" name="new_password"
                   class="form-control" minlength="6" required autofocus
                   placeholder="Не менее 6 символов">
            <button type="button" class="btn btn-outline-secondary" tabindex="-1"
                    onclick="togglePw('new_password', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Повторите пароль</label>
          <div class="input-group">
            <input type="password" id="confirm_password" name="confirm_password"
                   class="form-control" minlength="6" required
                   placeholder="Повторите пароль">
            <button type="button" class="btn btn-outline-secondary" tabindex="-1"
                    onclick="togglePw('confirm_password', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn w-100"
                style="background:#1B5E7B;color:#fff">
          <i class="bi bi-check-circle me-1"></i>Сохранить пароль
        </button>
      </form>

    </div>
  </div>
</div>

<script>
function togglePw(fieldId, btn) {
  var input = document.getElementById(fieldId);
  var icon  = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>

{% endblock %}
