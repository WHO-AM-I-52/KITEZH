<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Технические работы — KITEZH</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      cursor: none;
    }

    .overlay {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px 32px;
      background: rgba(15, 17, 23, 0.82);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .icon-wrap {
      font-size: 52px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.08); opacity: 0.85; }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #f0f4ff;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .status-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      color: #64748b;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      animation: blink 1.2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .dot.connected { background: #22c55e; animation: none; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    .attempt-count {
      font-size: 11px;
      color: #475569;
      margin-top: 10px;
    }

    .hint {
      position: fixed;
      bottom: 20px;
      font-size: 11px;
      color: #334155;
      z-index: 10;
      user-select: none;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="overlay">
  <div class="icon-wrap">🔧</div>
  <h1>Технические работы</h1>
  <p class="subtitle">
    Система временно недоступна.<br>
    Мы уже работаем над улучшениями.<br>
    <span style="color:#64748b;font-size:13px">Страница обновится автоматически.</span>
  </p>
  <div class="status-line">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Ожидаем восстановления сервера…</span>
  </div>
  <div class="attempt-count" id="attemptCount"></div>
</div>

<div class="hint">🦎 Подвигай мышку — кликай!</div>

<script>
// ==================================================================
//  Interactive Reptile — canvas-анимация
//  Рептилия следит за мышкой и реагирует на клики
// ==================================================================
(function() {
  var canvas = document.getElementById('c');
  var ctx    = canvas.getContext('2d');

  var W, H;
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Позиция мышки
  var mouse = { x: W / 2, y: H / 2 };
  window.addEventListener('mousemove', function(e) {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  // Сегмент цепочки тела
  var SEGMENTS   = 20;   // количество сегментов тела
  var SEG_LEN    = 18;   // длина сегмента
  var HEAD_R     = 14;   // радиус головы
  var SPEED      = 4.5;  // скорость движения к мыши
  var TONGUE_SPD = 0.18; // скорость языка

  // Цвета рептилии
  var COLORS = {
    body:    '#2d9e6b',
    bodyDark:'#1e7a50',
    belly:   '#a8e6c8',
    head:    '#26a96c',
    eye:     '#ffffff',
    pupil:   '#0a2518',
    tongue:  '#e53e3e',
    shadow:  'rgba(0,0,0,0.25)',
  };

  // Инициализация сегментов
  var segs = [];
  for (var i = 0; i < SEGMENTS; i++) {
    segs.push({ x: W / 2, y: H / 2 + i * SEG_LEN });
  }

  var tongueOut  = 0;    // 0..1 — выставленность языка
  var tongueDir  = 1;    // +1 выставляется / -1 убирается
  var tongueTick = 0;    // контроль паузы между движениями

  // Частицы при клике
  var sparks = [];
  window.addEventListener('click', function(e) {
    for (var i = 0; i < 12; i++) {
      var angle = (Math.PI * 2 / 12) * i + Math.random() * 0.3;
      sparks.push({
        x: e.clientX, y: e.clientY,
        vx: Math.cos(angle) * (2 + Math.random() * 3),
        vy: Math.sin(angle) * (2 + Math.random() * 3),
        life: 1.0,
        r: 3 + Math.random() * 3,
        color: ['#f59e0b','#ef4444','#22c55e','#3b82f6'][Math.floor(Math.random()*4)],
      });
    }
  });

  // Цветовые точки фона
  var dots = [];
  for (var d = 0; d < 60; d++) {
    dots.push({
      x: Math.random() * 2000,
      y: Math.random() * 1200,
      r: 0.5 + Math.random() * 1.5,
      a: 0.1 + Math.random() * 0.4,
    });
  }

  function drawBg() {
    ctx.fillStyle = '#0f1117';
    ctx.fillRect(0, 0, W, H);
    dots.forEach(function(d) {
      ctx.beginPath();
      ctx.arc(d.x % W, d.y % H, d.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(100,120,160,' + d.a + ')';
      ctx.fill();
    });
  }

  function segRadius(i) {
    // радиус сегмента: шире посередине, сужается к хвосту
    var t = i / (SEGMENTS - 1);
    return HEAD_R * (1 - t * 0.72);
  }

  function drawBody() {
    // Тень под телом
    for (var i = SEGMENTS - 1; i >= 1; i--) {
      var r = segRadius(i);
      ctx.beginPath();
      ctx.arc(segs[i].x + 2, segs[i].y + 3, r, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.shadow;
      ctx.fill();
    }

    // Сегменты тела (с хвоста к голове)
    for (var i = SEGMENTS - 1; i >= 1; i--) {
      var r  = segRadius(i);
      var t  = i / (SEGMENTS - 1);
      // чередование: чётные сегменты темнее
      var col = (i % 2 === 0) ? COLORS.body : COLORS.bodyDark;
      var grad = ctx.createRadialGradient(
        segs[i].x - r * 0.3, segs[i].y - r * 0.3, r * 0.1,
        segs[i].x, segs[i].y, r
      );
      grad.addColorStop(0, col);
      grad.addColorStop(1, COLORS.bodyDark);
      ctx.beginPath();
      ctx.arc(segs[i].x, segs[i].y, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // Брюшко брюха
      ctx.beginPath();
      ctx.arc(segs[i].x, segs[i].y, r * 0.55, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(168,230,200,0.18)';
      ctx.fill();
    }
  }

  function drawHead() {
    var h   = segs[0];
    var h2  = segs[1];
    var angle = Math.atan2(h.y - h2.y, h.x - h2.x);

    ctx.save();
    ctx.translate(h.x, h.y);
    ctx.rotate(angle);

    // Тень головы
    ctx.beginPath();
    ctx.ellipse(2, 3, HEAD_R * 1.3, HEAD_R * 1.0, 0, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.shadow;
    ctx.fill();

    // Голова
    var headGrad = ctx.createRadialGradient(-HEAD_R * 0.3, -HEAD_R * 0.3, 1, 0, 0, HEAD_R * 1.3);
    headGrad.addColorStop(0, '#34d399');
    headGrad.addColorStop(1, COLORS.head);
    ctx.beginPath();
    ctx.ellipse(0, 0, HEAD_R * 1.3, HEAD_R * 1.0, 0, 0, Math.PI * 2);
    ctx.fillStyle = headGrad;
    ctx.fill();

    // Ноздри
    ctx.beginPath();
    ctx.arc(HEAD_R * 0.8, -HEAD_R * 0.25, 2.5, 0, Math.PI * 2);
    ctx.arc(HEAD_R * 0.8,  HEAD_R * 0.25, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fill();

    // Глаза
    var eyePositions = [{ ex: HEAD_R * 0.1, ey: -HEAD_R * 0.7 },
                        { ex: HEAD_R * 0.1, ey:  HEAD_R * 0.7 }];
    eyePositions.forEach(function(ep) {
      // Белок глаза
      ctx.beginPath();
      ctx.arc(ep.ex, ep.ey, 5, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.eye;
      ctx.fill();
      // Зрачок (смотрит в сторону мыши в мировых координатах)
      var wx = h.x + ep.ex * Math.cos(angle) - ep.ey * Math.sin(angle);
      var wy = h.y + ep.ex * Math.sin(angle) + ep.ey * Math.cos(angle);
      var da = Math.atan2(mouse.y - wy, mouse.x - wx) - angle;
      ctx.beginPath();
      ctx.arc(ep.ex + Math.cos(da) * 2, ep.ey + Math.sin(da) * 2, 2.8, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.pupil;
      ctx.fill();
      // Блик
      ctx.beginPath();
      ctx.arc(ep.ex - 1.5, ep.ey - 1.5, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.fill();
    });

    // Язык
    if (tongueOut > 0.05) {
      var tLen = HEAD_R * 1.8 * tongueOut;
      ctx.save();
      ctx.strokeStyle = COLORS.tongue;
      ctx.lineWidth   = 2;
      ctx.lineCap     = 'round';
      // Основание языка
      ctx.beginPath();
      ctx.moveTo(HEAD_R * 1.1, 0);
      ctx.lineTo(HEAD_R * 1.1 + tLen * 0.6, 0);
      ctx.stroke();
      // Раздвоение
      ctx.beginPath();
      ctx.moveTo(HEAD_R * 1.1 + tLen * 0.6, 0);
      ctx.lineTo(HEAD_R * 1.1 + tLen, -tLen * 0.35);
      ctx.moveTo(HEAD_R * 1.1 + tLen * 0.6, 0);
      ctx.lineTo(HEAD_R * 1.1 + tLen,  tLen * 0.35);
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  function drawSparks() {
    sparks.forEach(function(s) {
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * s.life, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.globalAlpha = s.life;
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  function update() {
    // Движение головы к мышке
    var dx = mouse.x - segs[0].x;
    var dy = mouse.y - segs[0].y;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > SPEED) {
      segs[0].x += (dx / dist) * SPEED;
      segs[0].y += (dy / dist) * SPEED;
    }

    // Цепная кинематика (каждый сегмент тянется за предыдущим)
    for (var i = 1; i < SEGMENTS; i++) {
      var ddx = segs[i].x - segs[i-1].x;
      var ddy = segs[i].y - segs[i-1].y;
      var dd  = Math.sqrt(ddx * ddx + ddy * ddy);
      if (dd > SEG_LEN) {
        segs[i].x = segs[i-1].x + (ddx / dd) * SEG_LEN;
        segs[i].y = segs[i-1].y + (ddy / dd) * SEG_LEN;
      }
    }

    // Анимация языка
    tongueTick++;
    if (tongueTick > 40) {
      tongueOut += tongueDir * TONGUE_SPD;
      if (tongueOut >= 1) { tongueDir = -1; }
      if (tongueOut <= 0) { tongueDir = 1; tongueOut = 0; tongueTick = 0; }
    }

    // Частицы
    sparks = sparks.filter(function(s) {
      s.x  += s.vx;
      s.y  += s.vy;
      s.vy += 0.12;
      s.life -= 0.035;
      return s.life > 0;
    });
  }

  function loop() {
    drawBg();
    update();
    drawBody();
    drawHead();
    drawSparks();
    requestAnimationFrame(loop);
  }
  loop();
})();

// ==================================================================
//  Health poller — auto-reload when server is back
// ==================================================================
(function() {
  var dot     = document.getElementById('statusDot');
  var txt     = document.getElementById('statusText');
  var counter = document.getElementById('attemptCount');
  var attempts = 0;
  var INTERVAL = 5000;

  function poll() {
    attempts++;
    counter.textContent = 'Попытка ' + attempts;

    fetch('/health', { cache: 'no-store' })
      .then(function(r) {
        if (r.ok) {
          dot.classList.add('connected');
          txt.textContent = 'Сервер восстановлен! Перезагрузка…';
          counter.textContent = '';
          setTimeout(function() { location.reload(); }, 800);
        } else {
          setTimeout(poll, INTERVAL);
        }
      })
      .catch(function() {
        setTimeout(poll, INTERVAL);
      });
  }

  setTimeout(poll, INTERVAL);
})();
</script>
</body>
</html>
