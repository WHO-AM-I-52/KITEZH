{% extends 'base.html' %}
{% block title %}Мои задачи{% endblock %}

{% block content %}
<link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">

<div class="container-fluid mt-3">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="d-flex align-items-center gap-3">
      <h4 class="mb-0">📋 Мои задачи</h4>
      <div class="form-check mb-0">
        <input class="form-check-input" type="checkbox" id="showClosed">
        <label class="form-check-label text-muted small" for="showClosed">Показать завершённые</label>
      </div>
    </div>
    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createTaskModal">
      + Создать задачу
    </button>
  </div>

  <div id="tasks-table"></div>

</div>

{# ─── Модаль: создать задачу ─── #}
<div class="modal fade" id="createTaskModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <form method="post" action="{{ url_for('tasks.create_task') }}">
        <div class="modal-header">
          <h5 class="modal-title">Создать задачу</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Заголовок <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">Источник</label>
              <input type="text" name="source" class="form-control">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">Срок</label>
              <input type="date" name="deadline" class="form-control">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Исполнители</label>
            <select name="assignee_ids[]" class="form-select" multiple>
              {% for u in all_users %}
                <option value="{{ u.id }}">{{ u.full_name }}</option>
              {% endfor %}
            </select>
            <div class="form-text">Удерживайте Ctrl (или Cmd) для выбора нескольких.</div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
          <button type="submit" class="btn btn-primary">Создать</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
<script>
const CLOSED_STATUSES = ['done', 'cancelled', 'closed'];

function fmtType(cell) {
  const t = cell.getValue();
  if (t === 'task') return '<span class="badge bg-secondary" title="\u0417\u0430\u0434\u0430\u0447\u0430">\u0417</span>';
  return '<span class="badge bg-info text-dark" title="\u041e\u0431\u0440\u0430\u0449\u0435\u043d\u0438\u0435">\u041e</span>';
}

function fmtTitle(cell) {
  const row = cell.getRow().getData();
  const url = row.type === 'task' ? '/tasks/' + row.id : '/requests/' + row.id;
  return '<a href="' + url + '" class="text-decoration-none fw-semibold">' + (cell.getValue() || '') + '</a>';
}

function fmtDeadline(cell) {
  const row = cell.getRow().getData();
  const dl  = cell.getValue();
  if (!dl) return '<span class="text-muted">—</span>';
  if (row.overdue) return '<span class="text-danger fw-bold">' + dl + '</span>';
  return dl;
}

function fmtStatus(cell) {
  const row   = cell.getRow().getData();
  const s     = row.status;
  const label = row.status_label || s;
  const colorMap = {
    'new':         'secondary',
    'in_progress': 'primary',
    'review':      'warning',
    'done':        'success',
    'cancelled':   'danger',
    'in_work':     'primary',
    'pending':     'warning',
    'closed':      'dark',
    'draft':       'light',
  };
  const color = colorMap[s] || 'secondary';
  const extra = (s === 'draft') ? ' text-dark border' : '';
  return '<span class="badge bg-' + color + extra + '">' + label + '</span>';
}

function fmtExecutors(cell) {
  const list = cell.getValue();
  if (!list || !list.length) return '<span class="text-muted">—</span>';
  return list.join(', ');
}

function fmtActions(cell) {
  const row = cell.getRow().getData();
  const url = row.type === 'task' ? '/tasks/' + row.id : '/requests/' + row.id;
  const cls = row.type === 'task' ? 'btn-outline-secondary' : 'btn-outline-info';
  return '<a href="' + url + '" class="btn ' + cls + ' btn-sm py-0">Открыть</a>';
}

// Фильтр: скрывать закрытые если чекбокс не активен
function closedFilter(data) {
  const show = document.getElementById('showClosed').checked;
  if (show) return true;
  return !CLOSED_STATUSES.includes(data.status);
}

const table = new Tabulator('#tasks-table', {
  ajaxURL: '/tasks/api/my',
  layout: 'fitColumns',
  pagination: false,
  placeholder: 'Нет задач и обращений.',
  locale: 'ru',
  langs: {
    ru: {
      headerFilters: { default: 'Фильтр...' },
      data: { loading: 'Загрузка...', error: 'Ошибка загрузки' },
    }
  },
  initialSort: [{ column: 'deadline', dir: 'asc' }],
  // Фильтр по умолчанию — скрываем done/cancelled/closed
  initialFilter: [{ field: 'status', type: 'function', value: closedFilter }],
  rowFormatter: function(row) {
    if (row.getData().overdue) row.getElement().classList.add('table-danger');
  },
  columns: [
    {
      title: 'Тип', field: 'type', width: 70,
      formatter: fmtType,
      hozAlign: 'center',
      headerFilter: 'select',
      headerFilterParams: { values: { '': '— все —', 'task': 'Задача', 'request': 'Обращение' } },
      headerFilterFunc: function(headerValue, rowValue) {
        if (!headerValue) return true;
        return rowValue === headerValue;
      },
    },
    {
      title: 'Название', field: 'title',
      formatter: fmtTitle,
      headerFilter: 'input',
    },
    {
      title: 'Источник / номер', field: 'source', width: 180,
      headerFilter: 'input',
      formatter: function(cell) { return cell.getValue() || '<span class="text-muted">—</span>'; },
    },
    {
      title: 'Срок', field: 'deadline', width: 120,
      sorter: 'date', sorterParams: { format: 'YYYY-MM-DD' },
      formatter: fmtDeadline,
      headerFilter: 'input',
      headerFilterPlaceholder: 'гггг-мм-дд',
    },
    {
      title: 'Статус', field: 'status_label', width: 140,
      formatter: fmtStatus,
      headerFilter: 'select',
      headerFilterParams: {
        values: {
          '':            '— любой —',
          'new':         'Новая',
          'in_progress': 'В работе',
          'review':      'На проверке',
          'done':        'Выполнено',
          'cancelled':   'Отменено',
          'pending':     'Ожидает',
          'closed':      'Закрыто',
        }
      },
      headerFilterFunc: function(headerValue, rowValue, rowData) {
        if (!headerValue) return true;
        return rowData.status === headerValue;
      },
    },
    {
      title: 'Исполнители', field: 'executors',
      formatter: fmtExecutors,
      sorter: function(a, b) { return (a||[]).join(',').localeCompare((b||[]).join(',')); },
      headerFilter: 'input',
      headerFilterFunc: function(headerValue, rowValue) {
        if (!headerValue) return true;
        const q = headerValue.toLowerCase();
        return (rowValue || []).some(e => e.toLowerCase().includes(q));
      },
    },
    {
      title: '', field: 'id', width: 100,
      formatter: fmtActions,
      hozAlign: 'center',
      headerSort: false,
    },
  ],
});

// Чекбокс «Показать завершённые» — пересчитываем фильтр
document.getElementById('showClosed').addEventListener('change', function() {
  // Убираем функциональный фильтр и выставляем заново
  table.removeFilter(closedFilter);
  if (!this.checked) {
    table.addFilter(closedFilter);
  }
});

document.addEventListener('DOMContentLoaded', function () {
  const form = document.querySelector('#createTaskModal form');
  if (form) {
    form.addEventListener('submit', function () {
      setTimeout(() => table.replaceData(), 600);
    });
  }
});
</script>
{% endblock %}
